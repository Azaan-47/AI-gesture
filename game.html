<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gesture Phone Lock</title>
  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    /* Phone frame */
    .phone {
      width: 320px;
      height: 600px;
      background: linear-gradient(180deg, #111, #000);
      border-radius: 30px;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      position: relative;
      overflow: hidden;
    }

    /* Time */
    #time {
      font-size: 42px;
      text-align: center;
      margin-top: 40px;
    }

    #date {
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }

    /* Lock */
    #lock {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: red;
      margin: 80px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      transition: 0.3s;
    }

    #status {
      text-align: center;
      font-size: 18px;
    }

    #sequence {
      text-align: center;
      font-size: 16px;
      color: #bbb;
      margin-top: 10px;
    }

    /* Webcam small corner */
    #webcam-container {
      position: absolute;
      bottom: 10px;
      right: 10px;
    }

    canvas.webcam {
      width: 90px;
      border-radius: 10px;
      border: 2px solid #444;
    }

    /* Unlock animation */
    .unlocked {
      background: linear-gradient(180deg, #0a2, #030);
    }
  </style>
</head>
<body>

<div class="phone">

  <div id="time">--:--</div>
  <div id="date">Loading...</div>

  <div id="lock">🔒</div>

  <div id="status">Locked</div>
  <div id="sequence">● ● ● ●</div>

  <div id="webcam-container"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/lQPAgjPcH/";

let model, webcam;

const password = ["Thumbs Up", "Stop", "Peace", "Stop"];
let input = [];
let lastInputTime = 0;

// TIME FUNCTION
function updateTime() {
  const now = new Date();

  document.getElementById("time").innerText =
    now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

  document.getElementById("date").innerText =
    now.toDateString();
}

setInterval(updateTime, 1000);
updateTime();

async function init() {
  try {
    model = await tmImage.load(URL + "model.json", URL + "metadata.json");

    webcam = new tmImage.Webcam(120,120,true);
    await webcam.setup();
    await webcam.play();

    webcam.canvas.classList.add("webcam");
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    loop();

  } catch (e) {
    document.getElementById("status").innerText = "AI Error";
  }
}

async function loop() {
  webcam.update();
  await predict();
  requestAnimationFrame(loop);
}

async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let highest = prediction.reduce((a,b)=>
    a.probability>b.probability?a:b
  );

  if (highest.probability < 0.9) return;
  if (Date.now() - lastInputTime < 1000) return;

  lastInputTime = Date.now();

  const gesture = highest.className;

  if (!password.includes(gesture)) return;

  input.push(gesture);

  // show dots
  document.getElementById("sequence").innerText =
    "● ".repeat(input.length);

  checkPassword();
}

function checkPassword() {
  for (let i = 0; i < input.length; i++) {
    if (input[i] !== password[i]) {
      fail();
      return;
    }
  }

  if (input.length === password.length) {
    success();
  }
}

function success() {
  document.getElementById("status").innerText = "Unlocked";
  document.getElementById("lock").style.background = "green";
  document.getElementById("lock").innerText = "🔓";

  document.querySelector(".phone").classList.add("unlocked");

  setTimeout(reset, 4000);
}

function fail() {
  document.getElementById("status").innerText = "Wrong Password";
  input = [];

  setTimeout(() => {
    document.getElementById("status").innerText = "Locked";
    document.getElementById("sequence").innerText = "● ● ● ●";
  }, 1200);
}

function reset() {
  input = [];
  document.getElementById("status").innerText = "Locked";
  document.getElementById("lock").style.background = "red";
  document.getElementById("lock").innerText = "🔒";
  document.getElementById("sequence").innerText = "● ● ● ●";

  document.querySelector(".phone").classList.remove("unlocked");
}

init();
</script>

</body>
</html>
