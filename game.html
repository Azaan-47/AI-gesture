<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gesture Password System</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 { margin: 15px; }

    #status {
      font-size: 20px;
      margin: 10px;
    }

    #sequence {
      font-size: 18px;
      margin: 10px;
      color: #ccc;
    }

    #lock {
      width: 120px;
      height: 120px;
      margin: 30px auto;
      border-radius: 50%;
      background: red;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      transition: 0.3s;
    }

    #webcam-container {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    canvas.webcam {
      width: 150px;
      border: 2px solid white;
      border-radius: 10px;
    }

    #resetBtn {
      margin-top: 20px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #444;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Gesture Password Unlock</h1>
<div id="status">Locked 🔒</div>
<div id="sequence">Enter Gesture Sequence...</div>

<div id="lock">🔒</div>

<button id="resetBtn">Reset</button>

<div id="webcam-container"></div>

<!-- OLD STABLE SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/lQPAgjPcH/";

let model, webcam;

// PASSWORD
const password = ["Thumbs Up", "Stop", "Peace", "Stop"];
let input = [];

let lastInputTime = 0;

async function init() {
  try {
    model = await tmImage.load(URL + "model.json", URL + "metadata.json");

    webcam = new tmImage.Webcam(150,150,true);
    await webcam.setup();
    await webcam.play();

    webcam.canvas.classList.add("webcam");
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    loop();

  } catch (e) {
    console.error(e);
    document.getElementById("status").innerText = "Error loading AI";
  }
}

async function loop() {
  webcam.update();
  await predict();
  requestAnimationFrame(loop);
}

async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let highest = prediction.reduce((a,b)=>
    a.probability>b.probability?a:b
  );

  if (highest.probability < 0.9) return;

  if (Date.now() - lastInputTime < 1000) return;
  lastInputTime = Date.now();

  const gesture = highest.className;

  if (!password.includes(gesture)) return;

  input.push(gesture);

  document.getElementById("sequence").innerText =
    "Input: " + input.join(" → ");

  checkPassword();
}

function checkPassword() {
  for (let i = 0; i < input.length; i++) {
    if (input[i] !== password[i]) {
      fail();
      return;
    }
  }

  if (input.length === password.length) {
    success();
  }
}

function success() {
  document.getElementById("status").innerText = "Unlocked ✅";
  document.getElementById("lock").style.background = "green";
  document.getElementById("lock").innerText = "🔓";
}

function fail() {
  document.getElementById("status").innerText = "Wrong Password ❌";
  document.getElementById("lock").style.background = "red";
  input = [];

  setTimeout(() => {
    document.getElementById("status").innerText = "Locked 🔒";
    document.getElementById("sequence").innerText = "Try Again...";
  }, 1500);
}

document.getElementById("resetBtn").onclick = () => {
  input = [];
  document.getElementById("status").innerText = "Locked 🔒";
  document.getElementById("sequence").innerText = "Enter Gesture Sequence...";
  document.getElementById("lock").style.background = "red";
  document.getElementById("lock").innerText = "🔒";
};

init();
</script>

</body>
</html>
