<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gesture AI</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    h1 { margin-top: 20px; }
    #output {
      font-size: 28px;
      margin: 20px;
      font-weight: bold;
    }
    canvas {
      border: 2px solid #333;
      border-radius: 10px;
    }
    #results {
      width: 320px;
      margin: 20px auto;
      text-align: left;
    }
    .bar-container {
      margin-bottom: 12px;
    }
    .label {
      font-size: 14px;
      margin-bottom: 3px;
    }
    .bar {
      width: 100%;
      height: 18px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      width: 0%;
      color: white;
      font-size: 12px;
      text-align: right;
      padding-right: 5px;
      line-height: 18px;
      transition: width 0.2s ease;
    }
  </style>
</head>
<body>
  <h1>Gesture Recognition System</h1>
  <p>Show a gesture to see predictions</p>

  <div id="output">Initializing...</div>
  <div id="results"></div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/lQPAgjPcH/";

    let model, webcam;

    const colors = [
      "#4CAF50", // green
      "#f44336", // red
      "#2196F3", // blue
      "#ff9800", // orange
      "#9c27b0", // purple
      "#009688"  // teal
    ];

    async function init() {
      const output = document.getElementById("output");

      try {
        output.innerText = "Loading model...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);

        const maxPredictions = model.getTotalClasses();

        const resultsDiv = document.getElementById("results");

        // Create bars
        for (let i = 0; i < maxPredictions; i++) {
          const className = model.getClassLabels()[i];

          const container = document.createElement("div");
          container.className = "bar-container";

          const label = document.createElement("div");
          label.className = "label";
          label.innerText = className;

          const bar = document.createElement("div");
          bar.className = "bar";

          const fill = document.createElement("div");
          fill.className = "fill";
          fill.id = "bar-" + i;
          fill.style.background = colors[i % colors.length];

          bar.appendChild(fill);
          container.appendChild(label);
          container.appendChild(bar);
          resultsDiv.appendChild(container);
        }

        output.innerText = "Requesting camera...";

        webcam = new tmImage.Webcam(350, 350, true);
        await webcam.setup();
        await webcam.play();

        document.body.appendChild(webcam.canvas);

        output.innerText = "Ready";

        window.requestAnimationFrame(loop);

      } catch (err) {
        console.error(err);
        output.innerText = "Error: " + err.message;
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);

      let output = document.getElementById("output");

      // Find highest prediction
      let highest = prediction.reduce((a, b) =>
        a.probability > b.probability ? a : b
      );

      output.innerText = highest.className;

      // Update bars
      for (let i = 0; i < prediction.length; i++) {
        const prob = prediction[i].probability * 100;
        const bar = document.getElementById("bar-" + i);

        bar.style.width = prob + "%";
        bar.innerText = prob.toFixed(1) + "%";
      }
    }

    window.onload = init;
  </script>
</body>
</html>
