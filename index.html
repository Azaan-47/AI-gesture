<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gesture AI</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    h1 { margin-top: 20px; }
    #output {
      font-size: 28px;
      margin: 20px;
      font-weight: bold;
    }
    canvas {
      border: 2px solid #333;
      border-radius: 10px;
    }
    #results {
      background: white;
      display: inline-block;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 15px;
      font-size: 18px;
      text-align: left;
    }
  </style>
</head>
<body>
  <h1>Gesture Recognition System</h1>
  <p>Show a gesture to see predictions</p>

  <div id="output">Initializing...</div>
  <div id="results"></div>

  <!-- Stable libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/lQPAgjPcH/";

    let model, webcam;

    async function init() {
      const output = document.getElementById("output");

      try {
        output.innerText = "Loading model...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);

        output.innerText = "Requesting camera...";

        webcam = new tmImage.Webcam(350, 350, true);
        await webcam.setup();
        await webcam.play();

        document.body.appendChild(webcam.canvas);

        output.innerText = "Ready";

        window.requestAnimationFrame(loop);

      } catch (err) {
        console.error(err);
        output.innerText = "Error: " + err.message;
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);

      let output = document.getElementById("output");
      let resultsDiv = document.getElementById("results");

      let highest = prediction.reduce((a, b) =>
        a.probability > b.probability ? a : b
      );

      // Show main prediction
      output.innerText = highest.className;

      // Show all percentages
      let resultsHTML = "";
      for (let i = 0; i < prediction.length; i++) {
        const className = prediction[i].className;
        const prob = (prediction[i].probability * 100).toFixed(1);
        resultsHTML += className + ": " + prob + "%<br>";
      }

      resultsDiv.innerHTML = resultsHTML;
    }

    window.onload = init;
  </script>
</body>
</html>
