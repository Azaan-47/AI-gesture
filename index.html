<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gesture AI</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    #output {
      font-size: 28px;
      margin: 20px;
      font-weight: bold;
    }

    canvas {
      border: 2px solid #333;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>Gesture Recognition System</h1>
<div id="output">Initializing...</div>

<!-- STABLE SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/lQPAgjPcH/";

let model, webcam;
let lastTrigger = 0;
const cooldown = 800;

async function init() {
  const output = document.getElementById("output");

  try {
    output.innerText = "Loading model...";

    model = await tmImage.load(URL + "model.json", URL + "metadata.json");

    output.innerText = "Starting camera...";

    webcam = new tmImage.Webcam(350, 350, true);
    await webcam.setup();
    await webcam.play();

    document.body.appendChild(webcam.canvas);

    output.innerText = "Ready";

    window.requestAnimationFrame(loop);

  } catch (err) {
    console.error(err);
    output.innerText = "Error: " + err.message;
  }
}

async function loop() {
  webcam.update();
  await predict();
  window.requestAnimationFrame(loop);
}

async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let highest = prediction.reduce((a, b) =>
    a.probability > b.probability ? a : b
  );

  let output = document.getElementById("output");

  if (highest.probability < 0.8) {
    output.innerText = "Idle";
    document.body.style.background = "#111";
    return;
  }

  if (Date.now() - lastTrigger < cooldown) return;
  lastTrigger = Date.now();

  const result = highest.className;

  output.innerText = result;

  // simple visual feedback
  if (result === "Thumbs Up") {
    document.body.style.background = "#1b5e20";
  } 
  else if (result === "Thumbs Down") {
    document.body.style.background = "#b71c1c";
  } 
  else if (result === "Stop") {
    document.body.style.background = "#f9a825";
  } 
  else if (result === "Punch") {
    document.body.style.background = "#e65100";
  } 
  else if (result === "Peace") {
    document.body.style.background = "#0d47a1";
  } 
  else {
    document.body.style.background = "#111";
  }
}

init();
</script>

</body>
</html>
