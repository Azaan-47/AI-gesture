<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gesture AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      height: 100vh;
    }

    /* LEFT SIDE (bars) */
    #left {
      flex: 1;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .bar-container {
      margin: 15px 0;
    }

    .label {
      margin-bottom: 5px;
    }

    .bar {
      height: 20px;
      width: 0%;
      border-radius: 10px;
      transition: width 0.2s;
    }

    /* COLORS */
    .thumbsup { background: #4CAF50; }
    .thumbsdown { background: #f44336; }
    .stop { background: #ffeb3b; }
    .punch { background: #ff9800; }
    .peace { background: #2196F3; }
    .nothing { background: #888; }

    /* RIGHT SIDE (camera) */
    #right {
      width: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      border-radius: 10px;
      border: 2px solid #333;
    }

    #status {
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div id="left">
  <h1>Gesture Recognition</h1>

  <div class="bar-container">
    <div class="label">Thumbs Up</div>
    <div id="bar-thumbsup" class="bar thumbsup"></div>
  </div>

  <div class="bar-container">
    <div class="label">Thumbs Down</div>
    <div id="bar-thumbsdown" class="bar thumbsdown"></div>
  </div>

  <div class="bar-container">
    <div class="label">Stop</div>
    <div id="bar-stop" class="bar stop"></div>
  </div>

  <div class="bar-container">
    <div class="label">Punch</div>
    <div id="bar-punch" class="bar punch"></div>
  </div>

  <div class="bar-container">
    <div class="label">Peace</div>
    <div id="bar-peace" class="bar peace"></div>
  </div>

  <div class="bar-container">
    <div class="label">Nothing</div>
    <div id="bar-nothing" class="bar nothing"></div>
  </div>

  <div id="status">Initializing...</div>
</div>

<div id="right"></div>

<!-- FIXED SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/lQPAgjPcH/";

let model, webcam;

async function init() {
  const status = document.getElementById("status");

  try {
    status.innerText = "Loading model...";

    model = await tmImage.load(URL + "model.json", URL + "metadata.json");

    status.innerText = "Starting camera...";

    webcam = new tmImage.Webcam(350, 350, true);
    await webcam.setup();
    await webcam.play();

    document.getElementById("right").appendChild(webcam.canvas);

    status.innerText = "Ready";

    loop();

  } catch (e) {
    console.error(e);
    status.innerText = "Error: " + e.message;
  }
}

async function loop() {
  webcam.update();
  await predict();
  requestAnimationFrame(loop);
}

async function predict() {
  const prediction = await model.predict(webcam.canvas);

  prediction.forEach(p => {
    const percent = Math.round(p.probability * 100);

    const id = "bar-" + p.className.toLowerCase().replace(" ", "");
    const bar = document.getElementById(id);

    if (bar) {
      bar.style.width = percent + "%";
    }
  });
}

init();
</script>

</body>
</html>
