<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gesture AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      text-align: center;
    }

    h1 {
      margin: 15px;
    }

    #output {
      font-size: 24px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 30px;
      padding: 20px;
    }

    /* Bars */
    #results {
      width: 300px;
      text-align: left;
    }

    .bar-container {
      margin-bottom: 12px;
    }

    .label {
      font-size: 14px;
      margin-bottom: 3px;
    }

    .bar {
      width: 100%;
      height: 18px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      color: white;
      font-size: 12px;
      text-align: right;
      padding-right: 5px;
      line-height: 18px;
      transition: width 0.2s ease;
    }

    /* Webcam */
    #webcam-container canvas {
      border: 2px solid #333;
      border-radius: 10px;
    }

    /* Button */
    #gameBtn {
      margin: 30px 0;
      padding: 12px 20px;
      font-size: 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    #gameBtn:hover {
      background: #45a049;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <h1>Gesture Recognition System</h1>
  <div id="output">Initializing...</div>

  <div class="container">
    <!-- LEFT: Bars -->
    <div id="results"></div>

    <!-- RIGHT: Camera -->
    <div id="webcam-container"></div>
  </div>

  <!-- Bottom Button -->
  <button id="gameBtn">Play Gesture Game 🎮</button>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/lQPAgjPcH/";

    let model, webcam;

    const colors = [
      "#4CAF50",
      "#f44336",
      "#2196F3",
      "#ff9800",
      "#9c27b0",
      "#009688"
    ];

    async function init() {
      const output = document.getElementById("output");

      try {
        output.innerText = "Loading model...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);

        const maxPredictions = model.getTotalClasses();
        const resultsDiv = document.getElementById("results");

        // Create bars
        for (let i = 0; i < maxPredictions; i++) {
          const className = model.getClassLabels()[i];

          const container = document.createElement("div");
          container.className = "bar-container";

          const label = document.createElement("div");
          label.className = "label";
          label.innerText = className;

          const bar = document.createElement("div");
          bar.className = "bar";

          const fill = document.createElement("div");
          fill.className = "fill";
          fill.id = "bar-" + i;
          fill.style.background = colors[i % colors.length];

          bar.appendChild(fill);
          container.appendChild(label);
          container.appendChild(bar);
          resultsDiv.appendChild(container);
        }

        output.innerText = "Requesting camera...";

        webcam = new tmImage.Webcam(400, 400, true);
        await webcam.setup();
        await webcam.play();

        document.getElementById("webcam-container").appendChild(webcam.canvas);

        output.innerText = "Ready";

        window.requestAnimationFrame(loop);

      } catch (err) {
        console.error(err);
        output.innerText = "Error: " + err.message;
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);

      let output = document.getElementById("output");

      let highest = prediction.reduce((a, b) =>
        a.probability > b.probability ? a : b
      );

      output.innerText = highest.className;

      for (let i = 0; i < prediction.length; i++) {
        const prob = prediction[i].probability * 100;
        const bar = document.getElementById("bar-" + i);

        bar.style.width = prob + "%";
        bar.innerText = prob.toFixed(1) + "%";
      }
    }

    // Button click
    document.getElementById("gameBtn").onclick = function () {
      window.location.href = "game.html";
    };

    window.onload = init;
  </script>

</body>
</html>
